name: Build unsigned IPA

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build unsigned iPhone app
        run: |
          xcodebuild \
            -project PaxController.xcodeproj \
            -scheme PaxController \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$GITHUB_WORKSPACE/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find "$GITHUB_WORKSPACE/build/Build/Products/Release-iphoneos" \
            -maxdepth 1 \
            -type d \
            -name "*.app" \
            | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "No compiled app found."
            exit 1
          fi

          mkdir -p "$GITHUB_WORKSPACE/ipa/Payload"
          cp -R "$APP_PATH" "$GITHUB_WORKSPACE/ipa/Payload/"

          cd "$GITHUB_WORKSPACE/ipa"
          zip -r PaxController-unsigned.ipa Payload

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PaxController-unsigned-IPA
          path: ipa/PaxController-unsigned.ipa

      - name: Publish IPA as GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "ipa-build-${{ github.run_number }}" \
            "$GITHUB_WORKSPACE/ipa/PaxController-unsigned.ipa" \
            --title "PaxController IPA Build ${{ github.run_number }}" \
            --notes "Unsigned IPA. Sign with ESign before installing."